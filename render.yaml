# ─────────────────────────────────────────────────────────────────────
# Brahma UI — Render.com deployment blueprint
#
# Single Web Service that serves BOTH the React frontend (compiled to
# dist/) AND the FastAPI backend (uvicorn) on the same domain. Same
# origin → cookies just work, no SameSite=None gymnastics, OAuth
# callback lands cleanly.
#
# After the initial blueprint apply, set these in the dashboard:
#   - ANTHROPIC_API_KEY      (required — narrative + insights deck)
#   - GOOGLE_CLIENT_ID       (required — Google login button)
#   - GOOGLE_CLIENT_SECRET   (required — Google login button)
#   - DATABASE_URL           (recommended — Neon/Render Postgres URL)
#   - RESEND_API_KEY         (optional — email reset links)
#   - BRAHMA_NARRATIVE_MODEL (optional — flip Haiku→Sonnet for narratives)
#   - BRAHMA_INSIGHTS_MODEL  (optional — flip Haiku→Sonnet for decks)
#
# Plan choice:
#   - free  : 512 MB RAM, sleeps after 15 min idle. Auth + UI work, but
#             real engine runs (XGBoost, optuna 50 trials, SHAP) will OOM
#             on the 5K-row demo dataset. OK for clicking around / login.
#   - starter ($7/mo): 512 MB RAM, no sleep. Same RAM ceiling, but
#             always-on means narrative + UI feel snappy.
#   - standard ($25/mo): 2 GB RAM. Comfortable for 5K-200K row real runs.
#             Recommended once real users start touching the engine.
# ─────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: brahma-ui
    runtime: python
    plan: free          # bump to "standard" before exposing to real users
    region: oregon
    branch: main
    autoDeploy: true

    # Build the React bundle first, then init the upstream Brahma engine
    # submodule (vendor/brahma/), then install BOTH requirements files:
    # ours (server/requirements.txt) + upstream's (vendor/brahma/requirements.txt
    # — pulls xgboost / optuna / shap / sklearn / pandas / etc. that the
    # stage subprocesses run inline).
    buildCommand: |
      set -e
      git submodule update --init --recursive
      npm install
      npm run build
      pip install --upgrade pip
      pip install -r server/requirements.txt
      pip install --no-deps -r vendor/brahma/requirements.txt || true
      pip install anthropic xgboost optuna shap pyarrow scikit-learn pandas numpy matplotlib

    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health

    # Render's free tier has no persistent disk, so runs/{id}/ outputs
    # vanish when the service spins down (free) or restarts (starter).
    # If you bump to "standard", uncomment the disk block below to make
    # pipeline outputs (charts/leaderboards/models) survive restarts.
    #
    # disk:
    #   name: brahma-runs
    #   mountPath: /opt/render/project/src/runs
    #   sizeGB: 5

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20"

      # ── Anthropic — required for narrative + insights deck (D2e) ──
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Optional model overrides (Haiku is the cost-conscious default) ──
      - key: BRAHMA_NARRATIVE_MODEL
        sync: false
      - key: BRAHMA_INSIGHTS_MODEL
        sync: false

      # ── Auth secrets ──
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # JWT signing key — Render generates a fresh value, not committed
      - key: JWT_SECRET
        generateValue: true

      # ── Cookie config — Secure=true required for HTTPS in production ──
      - key: JWT_EXPIRY_DAYS
        value: "30"
      - key: COOKIE_NAME
        value: brahma_session
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax

      # ── URLs — adjust if Render assigns a non-default service name ──
      - key: FRONTEND_ORIGIN
        value: https://brahma-ui.onrender.com
      - key: BACKEND_ORIGIN
        value: https://brahma-ui.onrender.com

      # ── Database ──
      # Empty → ephemeral SQLite (data resets on every spin-down).
      # Set to a Postgres URL (Neon free tier works) for persistence.
      # Format: postgresql://user:pass@host/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Email (Resend) — optional; without it, reset links log to stdout ──
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Brahma <onboarding@resend.dev>"
